<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FACEBONY</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #0a0a0a;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      padding: 12px 8px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .new-chat-btn {
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      color: #fff;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 16px;
      text-align: left;
      width: 100%;
    }

    .chat-history {
      flex: 1;
      overflow-y: auto;
    }

    .chat-item {
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 4px;
      cursor: pointer;
      color: #ccc;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: transparent;
      border: none;
      width: 100%;
      text-align: left;
    }

    .chat-item:hover, .chat-item.active {
      background: #1f1f1f;
      color: #fff;
    }

    /* Main chat area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
      min-width: 0;
      height: 100%;
      position: relative;
    }

    .chat-header {
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .model-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .model-category,
    .model-dropdown {
      background: #111;
      border: 1px solid #333;
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      max-width: 140px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      -webkit-overflow-scrolling: touch;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 100%;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-content {
      padding: 12px 16px;
      border-radius: 18px;
      max-width: 85%;
      word-wrap: break-word;
      font-size: 15px;
      line-height: 1.5;
    }

    .message.user .message-content {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #fff;
    }

    .message.assistant .message-content {
      background: #0e0e0e;
      border: 1px solid #2a2a2a;
      color: #eee;
    }

    .input-area {
      padding: 12px 16px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
      background: #000;
    }

    .input-actions {
      display: flex;
      gap: 4px;
    }

    .input-actions button {
      background: none;
      border: none;
      color: #888;
      font-size: 24px;
      cursor: pointer;
      padding: 8px 4px;
      line-height: 1;
    }

    .message-input {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 12px 16px;
      color: #fff;
      font-size: 16px;
      resize: none;
      max-height: 120px;
      min-height: 48px;
      outline: none;
      font-family: inherit;
      line-height: 1.4;
    }

    .send-btn {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 20px;
      padding: 12px 18px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .file-upload {
      display: none;
    }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      .sidebar {
        position: absolute;
        left: -260px;
        top: 0;
        bottom: 0;
        z-index: 10;
        transition: left 0.2s;
        height: 100dvh;
      }
      .sidebar.open {
        left: 0;
      }
      .chat-header {
        padding: 10px 12px;
      }
      .model-category,
      .model-dropdown {
        padding: 6px 8px;
        font-size: 12px;
        max-width: 120px;
      }
      .input-area {
        padding: 10px 12px;
        padding-bottom: max(12px, env(safe-area-inset-bottom));
      }
      .message-input {
        font-size: 16px; /* prevents zoom on focus */
        padding: 10px 14px;
      }
      .send-btn {
        padding: 10px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <button class="new-chat-btn" id="newChatBtn">+ New chat</button>
    <div class="chat-history" id="chatHistoryList"></div>
  </div>

  <div class="main">
    <div class="chat-header">
      <div class="model-selector">
        <select class="model-category" id="modelCategorySelect" aria-label="Model category">
          <option value="uncensored">Uncensored</option>
          <option value="solver">Solver</option>
        </select>
        <select class="model-dropdown" id="modelSelect" aria-label="Model"></select>
      </div>
      <div style="flex:1"></div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="input-area">
      <div class="input-actions">
        <button id="fileUploadBtn" title="Upload file" type="button">📎</button>
        <input type="file" id="fileInput" class="file-upload" accept="image/*,.pdf,.txt,.doc,.docx">
      </div>
      <textarea class="message-input" id="messageInput" placeholder="Message FACEBONY..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    (function() {
      // Ensure DOM is fully loaded
      const chatMessages = document.getElementById('chatMessages');
      const messageInput = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const newChatBtn = document.getElementById('newChatBtn');
      const chatHistoryList = document.getElementById('chatHistoryList');
      const modelCategorySelect = document.getElementById('modelCategorySelect');
      const modelSelect = document.getElementById('modelSelect');
      const fileUploadBtn = document.getElementById('fileUploadBtn');
      const fileInput = document.getElementById('fileInput');

      // Model definitions (to be expanded)
      const models = {
        uncensored: [
          { id: 'uncensored-fast', name: 'Fast Uncensored' },
          { id: 'uncensored-smart', name: 'Smart Uncensored' }
        ],
        solver: [
          { id: 'solver-default', name: 'Solver Default' }
        ]
      };

      function updateModelDropdown() {
        const category = modelCategorySelect.value;
        const list = models[category] || [];
        modelSelect.innerHTML = '';
        list.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = m.name;
          modelSelect.appendChild(opt);
        });
      }
      modelCategorySelect.addEventListener('change', updateModelDropdown);
      updateModelDropdown();

      // Auto-resize textarea
      messageInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
      });

      function addMessage(role, content) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.innerHTML = `<div class="message-content">${content}</div>`;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        addMessage('user', text);
        messageInput.value = '';
        messageInput.style.height = 'auto';

        // Show typing indicator
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message assistant';
        typingDiv.innerHTML = '<div class="message-content">Thinking...</div>';
        typingDiv.id = 'typing-indicator';
        chatMessages.appendChild(typingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
          // Get system prompt from localStorage or default
          let systemPrompt = localStorage.getItem('facebony_system_prompt') || '';
          if (!systemPrompt) {
            systemPrompt = 'You are FACEBONY, a direct and helpful AI assistant.';
          }

          // Build messages for backend (simplified for now)
          const messages = [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: text }
          ];

          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              messages: messages,
              force_mode: 'auto',
              max_tokens: 2048,
              temperature: 0.7
            })
          });

          const data = await response.json();

          // Remove typing indicator
          const typingEl = document.getElementById('typing-indicator');
          if (typingEl) typingEl.remove();

          if (data.success) {
            const sourceInfo = data.source + (data.model ? ' | ' + data.model : '');
            addMessage('assistant', data.content);
            // Optionally show source as small text
            const lastMsg = chatMessages.lastChild;
            if (lastMsg) {
              const srcSpan = document.createElement('div');
              srcSpan.style.fontSize = '10px';
              srcSpan.style.color = '#666';
              srcSpan.style.marginTop = '4px';
              srcSpan.textContent = sourceInfo;
              lastMsg.querySelector('.message-content').appendChild(srcSpan);
            }
          } else {
            addMessage('assistant', 'Error: ' + (data.error || 'Unknown error'));
          }
        } catch (error) {
          const typingEl = document.getElementById('typing-indicator');
          if (typingEl) typingEl.remove();
          addMessage('assistant', 'Connection error: ' + error.message);
        }
      }

      sendBtn.addEventListener('click', sendMessage);

      messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      newChatBtn.addEventListener('click', () => {
        chatMessages.innerHTML = '';
        // TODO: create new chat ID
      });

      fileUploadBtn.addEventListener('click', () => {
        fileInput.click();
      });

      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          addMessage('user', `[Uploaded: ${file.name}]`);
          // TODO: handle file upload
          fileInput.value = '';
        }
      });

      // For mobile: sidebar toggle not yet implemented, but keep it hidden by default on small screens
      // Future: add hamburger menu to open sidebar

      // Load any saved system prompt
      const savedPrompt = localStorage.getItem('facebony_system_prompt');
      if (!savedPrompt) {
        localStorage.setItem('facebony_system_prompt', 'You are FACEBONY, a direct and helpful AI assistant. Keep responses clear, brief, and actionable. No fluff.');
      }

      // Initial welcome message
      addMessage('assistant', 'FACEBONY ready. Ask me anything.');
    })();
  </script>
</body>
          </html>
