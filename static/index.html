<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FACEBONY</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }
    .sidebar {
      width: 260px;
      background: #0a0a0a;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      padding: 12px 8px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .new-chat-btn {
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      color: #fff;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 16px;
      text-align: left;
      width: 100%;
    }
    .chat-history {
      flex: 1;
      overflow-y: auto;
    }
    .chat-item {
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 4px;
      cursor: pointer;
      color: #ccc;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: transparent;
      border: none;
      width: 100%;
      text-align: left;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
      min-width: 0;
      height: 100%;
    }
    .chat-header {
      padding: 12px 16px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .model-selector {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    select {
      background: #111;
      border: 1px solid #333;
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      -webkit-overflow-scrolling: touch;
    }
    .message {
      display: flex;
      gap: 12px;
      max-width: 100%;
    }
    .message.user {
      justify-content: flex-end;
    }
    .message-content {
      padding: 12px 16px;
      border-radius: 18px;
      max-width: 85%;
      word-wrap: break-word;
      font-size: 15px;
      line-height: 1.5;
    }
    .message.user .message-content {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #fff;
    }
    .message.assistant .message-content {
      background: #0e0e0e;
      border: 1px solid #2a2a2a;
      color: #eee;
    }
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
      background: #000;
    }
    .input-actions button {
      background: none;
      border: none;
      color: #888;
      font-size: 24px;
      cursor: pointer;
      padding: 8px 4px;
    }
    .message-input {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 12px 16px;
      color: #fff;
      font-size: 16px;
      resize: none;
      max-height: 120px;
      min-height: 48px;
      outline: none;
      font-family: inherit;
    }
    .send-btn {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 20px;
      padding: 12px 18px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .file-upload { display: none; }
    .src-info {
      font-size: 10px;
      color: #666;
      margin-top: 4px;
    }
    @media (max-width: 600px) {
      .sidebar { display: none; }
      .chat-header { padding: 10px 12px; }
      .input-area { padding: 10px 12px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <button class="new-chat-btn" id="newChatBtn">+ New chat</button>
    <div class="chat-history" id="chatHistoryList"></div>
  </div>

  <div class="main">
    <div class="chat-header">
      <div class="model-selector">
        <select id="modelCategorySelect"></select>
        <select id="modelSelect"></select>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="input-area">
      <div class="input-actions">
        <button id="fileUploadBtn" title="Upload file">📎</button>
        <input type="file" id="fileInput" class="file-upload" accept="image/*,.pdf,.txt,.doc,.docx">
      </div>
      <textarea class="message-input" id="messageInput" placeholder="Message FACEBONY..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    (function() {
      // ---------- REAL MODEL DATA (from backend SOURCES) ----------
      const MODEL_LIST = [
        // Solvers (uncensored: false)
        { id: 'cerebras', name: 'Cerebras (Llama 3.1 70B)', category: 'solver' },
        { id: 'groq', name: 'Groq (Llama 3.1 70B)', category: 'solver' },
        { id: 'sambanova', name: 'SambaNova (Llama 3.1 70B)', category: 'solver' },
        { id: 'together', name: 'Together (Llama 3.1 70B)', category: 'solver' },
        { id: 'openrouter', name: 'OpenRouter (Llama 3.1 70B)', category: 'solver' },
        // Uncensored
        { id: 'hf_abliterated', name: 'Abliterated (Llama 3.1 70B)', category: 'uncensored' },
        { id: 'hf_dolphin', name: 'Dolphin 2.9.4 (Llama 3.1 70B)', category: 'uncensored' },
        { id: 'hf_hermes', name: 'Hermes 3 (Llama 3.1 70B)', category: 'uncensored' },
        { id: 'horde', name: 'KoboldAI Horde', category: 'uncensored' }
      ];

      // DOM elements
      const chatMessages = document.getElementById('chatMessages');
      const messageInput = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const newChatBtn = document.getElementById('newChatBtn');
      const modelCategorySelect = document.getElementById('modelCategorySelect');
      const modelSelect = document.getElementById('modelSelect');
      const fileUploadBtn = document.getElementById('fileUploadBtn');
      const fileInput = document.getElementById('fileInput');

      // State
      let chatHistory = [];
      let selectedModelId = 'cerebras'; // default

      // ---------- Populate category dropdown ----------
      modelCategorySelect.innerHTML = `
        <option value="uncensored">Uncensored</option>
        <option value="solver">Solver</option>
      `;

      function updateModelDropdown() {
        const category = modelCategorySelect.value;
        const filtered = MODEL_LIST.filter(m => m.category === category);
        modelSelect.innerHTML = '';
        filtered.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.id;
          opt.textContent = m.name;
          modelSelect.appendChild(opt);
        });
        selectedModelId = modelSelect.value;
      }
      modelCategorySelect.addEventListener('change', updateModelDropdown);
      modelSelect.addEventListener('change', () => { selectedModelId = modelSelect.value; });
      updateModelDropdown(); // initial

      // ---------- Chat history from localStorage ----------
      try {
        const saved = localStorage.getItem('facebony_current_chat');
        if (saved) chatHistory = JSON.parse(saved);
        // Render existing messages
        chatHistory.forEach(msg => addMessage(msg.role, msg.content, msg.source));
      } catch(e) {}

      // System prompt (stored, editable later)
      const SYSTEM_PROMPT = 'You are FACEBONY. Be brief, direct, simple. No fluff.';

      function addMessage(role, content, source) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        let html = `<div class="message-content">${escapeHtml(content)}`;
        if (source) html += `<div class="src-info">${source}</div>`;
        html += `</div>`;
        msgDiv.innerHTML = html;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }

      async function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        addMessage('user', text);
        messageInput.value = '';
        messageInput.style.height = 'auto';

        // Add user message to history
        chatHistory.push({ role: 'user', content: text });

        // Typing indicator
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message assistant';
        typingDiv.innerHTML = '<div class="message-content">Thinking...</div>';
        typingDiv.id = 'typing-indicator';
        chatMessages.appendChild(typingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        try {
          const messages = [
            { role: 'system', content: SYSTEM_PROMPT },
            ...chatHistory.slice(-20) // keep context manageable
          ];

          const response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              messages: messages,
              model_id: selectedModelId,
              max_tokens: 1024,
              temperature: 0.7
            })
          });

          const data = await response.json();
          const typingEl = document.getElementById('typing-indicator');
          if (typingEl) typingEl.remove();

          if (data.success) {
            const sourceInfo = `${data.source} | ${data.model || ''}`;
            addMessage('assistant', data.content, sourceInfo);
            chatHistory.push({ role: 'assistant', content: data.content, source: sourceInfo });
            // Keep last 20 messages in storage
            if (chatHistory.length > 40) chatHistory = chatHistory.slice(-40);
            localStorage.setItem('facebony_current_chat', JSON.stringify(chatHistory));
          } else {
            addMessage('assistant', 'Error: ' + (data.error || 'Unknown error'));
          }
        } catch (error) {
          const typingEl = document.getElementById('typing-indicator');
          if (typingEl) typingEl.remove();
          addMessage('assistant', 'Connection error: ' + error.message);
        }
      }

      sendBtn.addEventListener('click', sendMessage);
      messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      messageInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
      });

      newChatBtn.addEventListener('click', () => {
        chatMessages.innerHTML = '';
        chatHistory = [];
        localStorage.removeItem('facebony_current_chat');
        addMessage('assistant', 'New chat. Select a model and ask anything.');
      });

      fileUploadBtn.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          addMessage('user', `[Uploaded: ${file.name}]`);
          fileInput.value = '';
          // File handling to be added later
        }
      });

      // Initial message
      if (chatHistory.length === 0) {
        addMessage('assistant', 'FACEBONY ready. Choose a model and start.');
      }
    })();
  </script>
</body>
  </html>
