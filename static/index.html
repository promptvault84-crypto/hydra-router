<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FACEBONY</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #0a0a0a;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      padding: 12px 8px;
      overflow-y: auto;
    }
    .new-chat-btn {
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      color: #fff;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 16px;
      text-align: left;
      width: 100%;
    }
    .chat-history {
      flex: 1;
      overflow-y: auto;
    }
    .chat-item {
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 4px;
      cursor: pointer;
      color: #ccc;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: transparent;
      border: none;
      width: 100%;
      text-align: left;
    }
    .chat-item:hover, .chat-item.active {
      background: #1f1f1f;
      color: #fff;
    }
    .chat-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .chat-actions button {
      background: none;
      border: none;
      color: #888;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 8px;
    }
    /* Main chat area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
      position: relative;
    }
    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .model-selector {
      display: flex;
      gap: 8px;
    }
    .model-category {
      background: #111;
      border: 1px solid #333;
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .model-dropdown {
      background: #111;
      border: 1px solid #333;
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      display: flex;
      gap: 12px;
      max-width: 100%;
    }
    .message.user {
      justify-content: flex-end;
    }
    .message-content {
      padding: 12px 16px;
      border-radius: 18px;
      max-width: 80%;
      word-wrap: break-word;
      font-size: 15px;
      line-height: 1.5;
    }
    .message.user .message-content {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #fff;
    }
    .message.assistant .message-content {
      background: #0e0e0e;
      border: 1px solid #2a2a2a;
      color: #eee;
    }
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid #1a1a1a;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .input-actions {
      display: flex;
      gap: 4px;
    }
    .input-actions button {
      background: none;
      border: none;
      color: #888;
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
    }
    .message-input {
      flex: 1;
      background: #111;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 12px 18px;
      color: #fff;
      font-size: 15px;
      resize: none;
      max-height: 150px;
      outline: none;
      font-family: inherit;
    }
    .send-btn {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 20px;
      padding: 10px 18px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
    }
    .file-upload {
      display: none;
    }
    /* Edit last message */
    .edit-btn {
      background: none;
      border: none;
      color: #888;
      font-size: 12px;
      margin-left: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <button class="new-chat-btn" id="newChatBtn">+ New chat</button>
    <div class="chat-history" id="chatHistoryList"></div>
  </div>

  <div class="main">
    <div class="chat-header">
      <div class="model-selector">
        <select class="model-category" id="modelCategorySelect">
          <option value="uncensored">Uncensored</option>
          <option value="solver">Solver</option>
        </select>
        <select class="model-dropdown" id="modelSelect"></select>
      </div>
      <div style="flex:1"></div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="input-area">
      <div class="input-actions">
        <button id="fileUploadBtn" title="Upload file">📎</button>
        <input type="file" id="fileInput" class="file-upload" accept="image/*,.pdf,.txt,.doc,.docx">
      </div>
      <textarea class="message-input" id="messageInput" placeholder="Message FACEBONY..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    // FACEBONY frontend logic (minimal for now)
    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const newChatBtn = document.getElementById('newChatBtn');
    const chatHistoryList = document.getElementById('chatHistoryList');
    const modelCategorySelect = document.getElementById('modelCategorySelect');
    const modelSelect = document.getElementById('modelSelect');
    const fileUploadBtn = document.getElementById('fileUploadBtn');
    const fileInput = document.getElementById('fileInput');

    // Model definitions (to be expanded)
    const models = {
      uncensored: [
        { id: 'uncensored-fast', name: 'Fast Uncensored' },
        { id: 'uncensored-smart', name: 'Smart Uncensored' }
      ],
      solver: [
        { id: 'solver-default', name: 'Solver Default' }
      ]
    };

    function updateModelDropdown() {
      const category = modelCategorySelect.value;
      const list = models[category] || [];
      modelSelect.innerHTML = '';
      list.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.name;
        modelSelect.appendChild(opt);
      });
    }
    modelCategorySelect.addEventListener('change', updateModelDropdown);
    updateModelDropdown();

    // Placeholder for sending messages
    function addMessage(role, content) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;
      msgDiv.innerHTML = `<div class="message-content">${content}</div>`;
      chatMessages.appendChild(msgDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    sendBtn.addEventListener('click', () => {
      const text = messageInput.value.trim();
      if (!text) return;
      addMessage('user', text);
      messageInput.value = '';
      // TODO: call backend API
      setTimeout(() => {
        addMessage('assistant', 'This is a placeholder response. Backend integration coming soon.');
      }, 500);
    });

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
      }
    });

    newChatBtn.addEventListener('click', () => {
      chatMessages.innerHTML = '';
      // TODO: create new chat ID
    });

    fileUploadBtn.addEventListener('click', () => {
      fileInput.click();
    });

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        addMessage('user', `[Uploaded: ${file.name}]`);
        // TODO: handle file upload
      }
    });

    // Placeholder for edit last message
    // Will be implemented later
  </script>
</body>
  </html>
